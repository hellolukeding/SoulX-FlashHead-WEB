<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC 流式数字人 - 全链路异步架构</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .header {
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 {
            font-size: 18px;
            font-weight: 500;
        }
        .status {
            display: flex;
            gap: 15px;
            font-size: 13px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
        }
        .status-dot.connected { background: #52c41a; }
        .status-dot.streaming { background: #1890ff; animation: pulse 1s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .main {
            flex: 1;
            display: flex;
            position: relative;
        }
        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .placeholder {
            text-align: center;
            color: #666;
        }
        .placeholder-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
        .sidebar {
            width: 320px;
            background: rgba(0,0,0,0.2);
            border-left: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 500;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .message {
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        .message.user {
            background: rgba(24, 144, 255, 0.2);
            margin-left: 30px;
        }
        .message.assistant {
            background: rgba(255, 255, 255, 0.1);
            margin-right: 30px;
        }
        .input-area {
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #1890ff;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #1890ff;
            color: #fff;
        }
        .btn-primary:hover {
            background: #40a9ff;
        }
        .btn-primary:disabled {
            background: #444;
            cursor: not-allowed;
        }
        .btn-connect {
            background: #52c41a;
        }
        .btn-connect:hover {
            background: #73d13d;
        }
        .btn-disconnect {
            background: #ff4d4f;
        }
        .metrics {
            padding: 10px 15px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .metric-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .metric-value {
            color: #1890ff;
            font-weight: 500;
        }

        /* 待机动画 */
        .idle-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .idle-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .idle-avatar {
            position: relative;
            width: 150px;
            height: 150px;
        }
        .idle-avatar-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            animation: breathe 2s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .idle-ring {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 3px solid transparent;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .idle-text {
            margin-top: 20px;
            font-size: 16px;
            color: #fff;
            text-align: center;
        }
        .idle-dots {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-top: 10px;
        }
        .idle-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }
        .idle-dot:nth-child(1) { animation-delay: 0s; }
        .idle-dot:nth-child(2) { animation-delay: 0.2s; }
        .idle-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }
        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            transition: width 0.3s ease;
            animation: progress 2s ease-out forwards;
        }
        @keyframes progress {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 WebRTC 流式数字人</h1>
            <div class="status">
                <div class="status-item">
                    <span class="status-dot" id="connectionStatus"></span>
                    <span id="connectionText">未连接</span>
                </div>
                <div class="status-item">
                    <span class="status-dot" id="streamingStatus"></span>
                    <span id="streamingText">等待中</span>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="video-container">
                <div class="placeholder" id="placeholder">
                    <div class="placeholder-icon">🤖</div>
                    <div>点击"连接"开始</div>
                </div>
                <video id="remoteVideo" autoplay playsinline style="display:none"></video>

                <!-- 待机动画 -->
                <div class="idle-overlay hidden" id="idleOverlay">
                    <div class="idle-avatar">
                        <div class="idle-ring"></div>
                        <div class="idle-avatar-image">🤖</div>
                    </div>
                    <div class="idle-text">
                        <div id="idleStatusText">正在思考中...</div>
                        <div class="idle-dots">
                            <div class="idle-dot"></div>
                            <div class="idle-dot"></div>
                            <div class="idle-dot"></div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="idleProgress"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="sidebar-header">聊天</div>

                <div class="chat-messages" id="chatMessages">
                    <div class="message assistant">
                        你好！我是数字人助手，基于全链路流式架构。
                        <br><br>
                        <small style="color:#999">特性：CosyVoice 流式切片 + SoulX 时空缓存 + WebRTC UDP 推流</small>
                    </div>
                </div>

                <div class="metrics">
                    <div class="metric-item">
                        <span>音频延迟</span>
                        <span class="metric-value" id="audioLatency">-- ms</span>
                    </div>
                    <div class="metric-item">
                        <span>视频延迟</span>
                        <span class="metric-value" id="videoLatency">-- ms</span>
                    </div>
                    <div class="metric-item">
                        <span>音画同步</span>
                        <span class="metric-value" id="avSync">-- ms</span>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-group">
                        <input type="text" id="messageInput" placeholder="输入消息..." />
                        <button class="btn-primary" id="sendBtn" disabled>发送</button>
                    </div>
                    <div style="margin-top: 10px;">
                        <button class="btn-primary btn-connect" id="connectBtn" style="width:100%">连接</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // WebRTC 流式客户端
        class WebRTCStreamingClient {
            constructor() {
                this.pc = null;
                this.sessionId = null;
                this.video = document.getElementById('remoteVideo');
                this.placeholder = document.getElementById('placeholder');
                this.idleOverlay = document.getElementById('idleOverlay');
                this.idleProgress = document.getElementById('idleProgress');
                this.idleStatusText = document.getElementById('idleStatusText');
                this.isConnected = false;
                this.isStreaming = false;
                this.messageStartTime = null;

                // 绑定 UI
                this.bindUI();
            }

            bindUI() {
                this.connectBtn = document.getElementById('connectBtn');
                this.sendBtn = document.getElementById('sendBtn');
                this.input = document.getElementById('messageInput');

                this.connectBtn.addEventListener('click', () => this.connect());
                this.sendBtn.addEventListener('click', () => this.sendMessage());
                this.input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.sendMessage();
                });
            }

            showIdleAnimation(status = '正在思考中...') {
                this.idleOverlay.classList.remove('hidden');
                this.idleStatusText.textContent = status;

                // 重置并启动进度条
                this.idleProgress.style.animation = 'none';
                this.idleProgress.offsetHeight; // 触发重排
                this.idleProgress.style.animation = 'progress 2s ease-out forwards';

                console.log('[Idle] 显示待机动画:', status);
            }

            hideIdleAnimation() {
                this.idleOverlay.classList.add('hidden');

                const elapsed = performance.now() - this.messageStartTime;
                console.log('[Idle] 隐藏待机动画，耗时:', Math.round(elapsed), 'ms');
            }

            async connect() {
                try {
                    this.updateStatus('connecting');
                    this.addMessage('system', '正在连接 WebRTC...');

                    // 创建 PeerConnection
                    this.pc = new RTCPeerConnection({
                        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                    });

                    // 监听轨道
                    this.pc.ontrack = (e) => {
                        console.log('[WebRTC] 收到轨道:', e.track.kind);
                        if (e.track.kind === 'video') {
                            this.video.srcObject = e.streams[0];
                            this.video.style.display = 'block';
                            this.placeholder.style.display = 'none';
                            this.isStreaming = true;

                            // 收到视频，隐藏待机动画
                            this.hideIdleAnimation();

                            this.updateStatus('streaming');
                        }
                    };

                    this.pc.oniceconnectionstatechange = () => {
                        console.log('[WebRTC] ICE 状态:', this.pc.iceConnectionState);
                    };

                    // 创建 Offer
                    const offer = await this.pc.createOffer();
                    await this.pc.setLocalDescription(offer);

                    // 发送 Offer 到服务器
                    const response = await fetch('http://192.168.1.132:8000/api/v1/webrtc/offer', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sdp: offer.sdp,
                            type: offer.type
                        })
                    });

                    const answer = await response.json();

                    if (answer.error) {
                        throw new Error(answer.error);
                    }

                    this.sessionId = answer.session_id;

                    // 设置远程描述
                    await this.pc.setRemoteDescription(
                        new RTCSessionDescription(answer)
                    );

                    this.isConnected = true;
                    this.sendBtn.disabled = false;
                    this.connectBtn.textContent = '断开';
                    this.connectBtn.className = 'btn-primary btn-disconnect';
                    this.connectBtn.onclick = () => this.disconnect();

                    this.addMessage('system', '✅ WebRTC 连接成功！');
                    this.updateStatus('connected');

                } catch (error) {
                    console.error('[WebRTC] 连接失败:', error);
                    this.addMessage('system', '❌ 连接失败: ' + error.message);
                    this.updateStatus('disconnected');
                }
            }

            async sendMessage() {
                const text = this.input.value.trim();
                if (!text || !this.sessionId) return;

                this.input.value = '';
                this.addMessage('user', text);
                this.sendBtn.disabled = true;
                this.messageStartTime = performance.now();

                // 显示待机动画
                this.showIdleAnimation('正在思考...');

                try {
                    const response = await fetch('http://192.168.1.132:8000/api/v1/webrtc/message', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            session_id: this.sessionId,
                            text: text
                        })
                    });

                    const result = await response.json();

                    if (result.error) {
                        throw new Error(result.error);
                    }

                    // 0.5秒后更新状态
                    setTimeout(() => {
                        if (this.idleOverlay.classList.contains('hidden') === false) {
                            this.idleStatusText.textContent = '正在生成语音...';
                        }
                    }, 500);

                    // 1秒后再次更新状态
                    setTimeout(() => {
                        if (this.idleOverlay.classList.contains('hidden') === false) {
                            this.idleStatusText.textContent = '正在生成视频...';
                        }
                    }, 1000);

                } catch (error) {
                    console.error('[Message] 发送失败:', error);
                    this.addMessage('system', '❌ 发送失败: ' + error.message);
                    this.hideIdleAnimation();
                } finally {
                    this.sendBtn.disabled = false;
                }
            }

            disconnect() {
                if (this.pc) {
                    this.pc.close();
                    this.pc = null;
                }

                this.video.srcObject = null;
                this.video.style.display = 'none';
                this.placeholder.style.display = 'block';

                this.isConnected = false;
                this.isStreaming = false;
                this.sendBtn.disabled = true;

                this.connectBtn.textContent = '连接';
                this.connectBtn.className = 'btn-primary btn-connect';
                this.connectBtn.onclick = () => this.connect();

                this.updateStatus('disconnected');
                this.addMessage('system', '🔌 已断开连接');
            }

            addMessage(type, text) {
                const container = document.getElementById('chatMessages');
                const div = document.createElement('div');
                div.className = `message ${type}`;
                div.innerHTML = text;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }

            updateStatus(status) {
                const connDot = document.getElementById('connectionStatus');
                const connText = document.getElementById('connectionText');
                const streamDot = document.getElementById('streamingStatus');
                const streamText = document.getElementById('streamingText');

                switch (status) {
                    case 'connecting':
                        connDot.className = 'status-dot';
                        connText.textContent = '连接中...';
                        break;
                    case 'connected':
                        connDot.className = 'status-dot connected';
                        connText.textContent = '已连接';
                        break;
                    case 'streaming':
                        connDot.className = 'status-dot connected';
                        streamDot.className = 'status-dot streaming';
                        connText.textContent = '已连接';
                        streamText.textContent = '推流中';
                        break;
                    case 'disconnected':
                        connDot.className = 'status-dot';
                        streamDot.className = 'status-dot';
                        connText.textContent = '未连接';
                        streamText.textContent = '等待中';
                        break;
                }
            }
        }

        // 初始化
        const client = new WebRTCStreamingClient();
    </script>
</body>
</html>
