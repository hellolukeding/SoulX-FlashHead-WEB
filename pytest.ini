[pytest]
# Pytest 配置文件

# 测试目录
testpaths = test

# 测试文件模式
python_files = test_*.py

# 测试类模式
python_classes = Test*

# 测试函数模式
python_functions = test_*

# 命令行选项
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    -p loguru

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试
    requires_api: 需要 API key 的测试
    requires_gpu: 需要 GPU 的测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置（如果安装了 pytest-cov）
# addopts = --cov=backend --cov-report=html --cov-report=term

# 异步测试支持（如果安装了 pytest-asyncio）
asyncio_mode = auto

# 最小 Python 版本
minversion = 7.0

# 忽略的路径
norecursedir = .git .tox dist build *.egg
